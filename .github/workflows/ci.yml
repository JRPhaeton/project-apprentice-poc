name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # §10 CI order (fail-fast): [parallel] lint · typecheck · source-asset-lint
  # → unit + coverage gate → build → size-budget → Playwright E2E.
  # The balance-sim gate joins when the Combat lane lands it (§10; expected
  # red until the M1→M3 lethality tuning per §5.2).
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # §10 unit + coverage gate on the combat core — CLI flags only, so
      # vite.config.ts stays untouched. May legitimately fail until the
      # Combat lane's unit tests land (author-time caveat, §10).
      - run: npx vitest run --coverage.enabled --coverage.include='src/core/battle/**' --coverage.thresholds.lines=90 --coverage.thresholds.functions=85

  # §6/§10 source-asset-lint: pure file checks, pre-build parallel group
  # (no build, no npm ci needed).
  source-asset-lint:
    runs-on: ubuntu-latest
    steps:
      # ffprobe is NOT guaranteed on ubuntu runners; §6 sanctions this one
      # extra CI dep for the audio duration gates (cheap for 16 files).
      - name: install ffmpeg (ffprobe)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg
      - uses: actions/checkout@v4
      - name: asset source checks
        run: |
          python3 - <<'PY'
          import json
          import os
          import struct
          import subprocess
          import sys

          errors = []
          warnings = []

          def probe_duration(path):
              """Duration in seconds via ffprobe, or None (recorded as error)."""
              try:
                  out = subprocess.run(
                      ['ffprobe', '-v', 'error', '-show_entries', 'format=duration',
                       '-of', 'default=noprint_wrappers=1:nokey=1', path],
                      capture_output=True, text=True, timeout=30
                  )
                  return float(out.stdout.strip())
              except (OSError, subprocess.SubprocessError, ValueError):
                  errors.append(f'{path}: ffprobe could not read a duration')
                  return None

          # (a) Every PNG under public/assets/ sits on the 16 px grid
          # (§2/§6): read width/height straight from the IHDR chunk.
          png_root = 'public/assets'
          if os.path.isdir(png_root):
              for dirpath, _dirs, files in os.walk(png_root):
                  for name in sorted(files):
                      if not name.lower().endswith('.png'):
                          continue
                      path = os.path.join(dirpath, name)
                      with open(path, 'rb') as fh:
                          head = fh.read(24)
                      if len(head) < 24 or head[:8] != b'\x89PNG\r\n\x1a\n':
                          errors.append(f'{path}: not a valid PNG')
                          continue
                      width, height = struct.unpack('>II', head[16:24])
                      if width % 16 or height % 16:
                          errors.append(f'{path}: {width}x{height} not divisible by 16')
          else:
              print(f'note: {png_root}/ absent - PNG grid check has nothing to lint yet')

          # (b) Every manifest file path resolves under public/ (the
          # manifest-to-file half of §6 referential integrity). Accept
          # either public/<path> or public/assets/<path> until the asset
          # base dir is pinned at integration.
          def resolve_path(rel):
              for base in ('public', 'public/assets'):
                  candidate = os.path.join(base, rel)
                  if os.path.isfile(candidate):
                      return candidate
              return None

          def resolves(rel):
              return resolve_path(rel) is not None

          with open('src/data/art-manifest.json') as fh:
              art = json.load(fh)
          for key, entry in sorted(art.items()):
              rel = entry.get('file')
              if not isinstance(rel, str) or not resolves(rel):
                  errors.append(f'art-manifest.json {key}: file {rel!r} does not resolve under public/')

          # M4: audio shipped - existence is a hard failure now, and every
          # file passes the §6 duration gates via ffprobe (music ≤ 60 s,
          # SFX ≤ 3 s; optional loopStart/loopEnd inside [0, duration)).
          MUSIC_MAX_S = 60.0
          SFX_MAX_S = 3.0
          with open('src/data/audio-manifest.json') as fh:
              audio = json.load(fh)
          for key, entry in sorted(audio.items()):
              for codec in ('ogg', 'm4a'):
                  rel = entry.get(codec)
                  if not isinstance(rel, str):
                      errors.append(f'audio-manifest.json {key}: missing {codec} path')
                      continue
                  path = resolve_path(rel)
                  if path is None:
                      errors.append(f'audio-manifest.json {key}: {codec} {rel!r} does not resolve under public/')
                      continue
                  duration = probe_duration(path)
                  if duration is None:
                      continue
                  cap = MUSIC_MAX_S if key.startswith('music.') else SFX_MAX_S
                  if duration > cap:
                      errors.append(f'{path}: {key} duration {duration:.3f}s exceeds the {cap:.0f}s cap (§6)')
                  loop_start = entry.get('loopStart')
                  loop_end = entry.get('loopEnd')
                  if loop_start is not None or loop_end is not None:
                      if not (isinstance(loop_start, (int, float)) and isinstance(loop_end, (int, float))):
                          errors.append(f'audio-manifest.json {key}: loopStart/loopEnd must both be numbers when present')
                      elif not (0 <= loop_start < loop_end <= duration):
                          errors.append(
                              f'{path}: {key} loop points [{loop_start}, {loop_end}] violate '
                              f'0 <= loopStart < loopEnd <= duration ({duration:.3f}s) (§6)'
                          )

          # (c) Violations fail the job; warnings do not (yet).
          for message in warnings:
              print(f'WARNING: {message}')
          if errors:
              for message in errors:
                  print(f'ERROR: {message}', file=sys.stderr)
              sys.exit(1)
          print(f'source-asset-lint OK ({len(warnings)} warning(s))')
          PY

  build-e2e:
    needs: [quality, source-asset-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # §6/§10 size-budget: total shipped dist ≤ 8 MB = 8,388,608 bytes,
      # measured as real bytes on the production build (both audio codecs
      # count once they ship).
      - name: size-budget
        run: |
          size="$(du -sb dist | cut -f1)"
          echo "dist: ${size} bytes (budget 8388608)"
          test "${size}" -le 8388608
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium
      # test:e2e's webServer rebuilds dist with --mode e2e (debug hooks
      # enabled); restore the production artifact so Pages never ships the
      # debug build (§4).
      - name: rebuild production dist for Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-e2e
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      # §10 release gate: the LIVE URL serves index.html and the hashed JS
      # bundle with correct status + Content-Type after every deploy.
      - name: live-url release gate
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          echo "checking ${url}"
          html_ct="$(curl -fsS -o /tmp/index.html -w '%{content_type}' "${url}")"
          echo "index.html: ${html_ct}"
          case "${html_ct}" in text/html*) ;; *) echo 'bad Content-Type'; exit 1;; esac
          bundle="$(grep -oE 'assets/[A-Za-z0-9._-]+\.js' /tmp/index.html | head -1)"
          test -n "${bundle}" || { echo 'no JS bundle reference found'; exit 1; }
          js_ct="$(curl -fsS -o /dev/null -w '%{content_type}' "${url}${bundle}")"
          echo "${bundle}: ${js_ct}"
          case "${js_ct}" in *javascript*) ;; *) echo 'bad JS Content-Type'; exit 1;; esac
