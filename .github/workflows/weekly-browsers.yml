name: Weekly Firefox/WebKit E2E

# §3/§10 of docs/PLAN.md: Chromium runs on every merge; Firefox and WebKit
# (Safari proxy) run weekly to catch engine-specific regressions — audio
# codec fallback (M4A), rendering quirks — without slowing the merge gate.
on:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-browser:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test --project=${{ matrix.browser }}
